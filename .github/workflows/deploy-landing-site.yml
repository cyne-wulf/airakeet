name: Deploy Landing Site

on:
  push:
    branches: [ main ]
    paths:
      - 'Docs/landing-site/**'
      - '.github/workflows/deploy-landing-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Upload landing site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Docs/landing-site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
